<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Eater&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&family=Staatliches&display=swap"
      rel="stylesheet"
    />
    <script src="../js/login.js" defer></script>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="overlay"></div>
    <header>
      <div class="header">
        <div class="logo">
          <img src="../image/Icon.png" alt="" />
          <span class="logo1">Rikkei</span>
          <span class="logo2">Cinema</span>
        </div>
        <div class="navbar">
          <a href="">Trang Chủ</a>
          <a href="">Thông Tin</a>
          <a href="">Liên Hệ</a>
          <a class="select" href="">Đăng Nhập</a>
        </div>
      </div>
    </header>
    <main>
      <div class="login-card">
        <img src="../image/popcorn.png" alt="" />
        <div class="gradient"></div>
        <div class="login-form">
          <h1>Chào mừng quay trở lại</h1>
          <div class="login-email">
            <span>Email</span><br />
            <input type="email" placeholder="Nhập email của bạn"/>
          </div>
          <div class="login-password">
            <span>Mật khẩu</span><br />
            <input type="password" placeholder="Nhập mật khẩu của bạn"/>
          </div>
          <div class="option-login">
            <div class="remember-login">
              <input type="checkbox" name="" id="" />
              Ghi nhớ đăng nhập
            </div>
            <div class="forgot-login">
              <a href="">Quên mật khẩu?</a>
            </div>
          </div>
          <button>Đăng nhập</button>
          <p>Bạn chưa có tài khoản?<a href="">Đăng ký ngay</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
