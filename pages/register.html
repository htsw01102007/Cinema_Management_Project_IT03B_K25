<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Eater&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&family=Staatliches&display=swap"
      rel="stylesheet"
    />
    <script src="../js/register.js" defer></script>
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="overlay"></div>
    <header>
      <div class="header">
        <div class="logo">
          <img src="../image/Icon.png" alt="" />
          <span class="logo1">Rikkei</span>
          <span class="logo2">Cinema</span>
        </div>
        <div class="navbar">
          <a href="">Trang Chủ</a>
          <a href="">Thông Tin</a>
          <a href="">Liên Hệ</a>
          <a class="select" href="">Đăng Nhập</a>
        </div>
      </div>
    </header>
    <main>
      <div class="register-card">
        <div class="register-form">
          <h1>Tạo tài khoản mới</h1>
          <p>Đăng ký để đặt vé xem phim ngay hôm nay</p>
          <div class="register-name">
            <span class="form">Họ và tên</span><br />
            <div class="input">
            <input type="text" placeholder="Nguyễn Văn A" />
            <i class="fa-regular fa-user" style="color: #94A3B8;"></i>
            </div>
          </div>
          <div class="register-email">
            <span class="form">Email</span><br />
            <div class="input">
            <input type="text" placeholder="email@example.com" />
            <i class="fa-regular fa-envelope" style="color: #94A3B8;"></i>
            </div>
          </div>
          <div class="register-password">
            <span class="form">Mật khẩu</span><br />
            <div class="input">
            <input type="text" placeholder="******" />
            <i class="fa-regular fa-eye" style="color: #94A3B8;"></i>
            </div>
          </div>
          <div class="register-confirm-password">
            <span class="form">Xác nhận mật khẩu</span><br />
            <div class="input">
            <input type="text" placeholder="******" />
            <i class="fa-regular fa-eye" style="color: #94A3B8;"></i>
            </div>
          </div>
          <div class="eula">
              <input type="checkbox" name="" id="eula" />
              <p>Tôi đồng ý với <a href="">điều khoản sử dụng</a> và chính sách bảo mật của CineEdu.</p>
          </div>
          <button>
            Đăng ký
            <i
              class="fa-solid fa-arrow-right"
              style="color: rgb(255, 255, 255)"
            ></i>
          </button>
          <p class="to-login">Đã có tài khoản? <a href="../pages/login.html">Đăng nhập ngay</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
